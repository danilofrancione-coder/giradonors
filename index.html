<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GiraDoni – Metadonors</title>
<style>
  :root{--navy2:#1E2E40;--teal:#3D9E9E;--gold:#F5B830;--orange:#E8633A;--white:#FFFFFF;--gray:rgba(255,255,255,0.5);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--navy2);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 800px 500px at 85% 5%,rgba(61,158,158,0.1) 0%,transparent 60%),radial-gradient(ellipse 600px 600px at 5% 90%,rgba(245,184,48,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;background:var(--navy2);}
  .screen.active{display:flex;}
  #form-screen{justify-content:flex-start;overflow-y:auto;padding:20px 24px 40px;gap:14px;}
  .screen-logo{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .screen-logo img{height:55px;width:auto;}
  .logo-claim{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;text-transform:uppercase;}
  .screen-title{text-align:center;margin-bottom:4px;}
  .screen-title h1{font-size:clamp(26px,5vw,48px);font-weight:800;letter-spacing:-0.04em;color:var(--white);}
  .screen-title h1 .donors{color:var(--gold);}
  .screen-title p{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.07em;text-transform:uppercase;margin-top:3px;}
  .form-intro{text-align:center;}
  .form-intro h2{font-size:clamp(17px,2.5vw,22px);font-weight:700;color:var(--white);line-height:1.25;}
  .form-intro p{font-size:13px;color:var(--gray);margin-top:5px;}
  .field-group{width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px;}
  .field-row{display:flex;gap:10px;}
  .field-wrap{flex:1;display:flex;flex-direction:column;gap:5px;}
  .field-wrap label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.06em;text-transform:uppercase;}
  .req{color:var(--gold);margin-left:2px;}
  .field-wrap input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(61,158,158,0.25);background:rgba(61,158,158,0.07);color:var(--white);font-size:15px;font-family:inherit;font-weight:500;outline:none;-webkit-appearance:none;}
  .field-wrap input::placeholder{color:rgba(255,255,255,0.2);}
  .field-wrap input:focus{border-color:rgba(61,158,158,0.6);background:rgba(61,158,158,0.12);}
  .field-wrap input.error{border-color:rgba(232,99,58,0.7);background:rgba(232,99,58,0.08);}
  #form-error{font-size:13px;color:var(--orange);font-weight:500;text-align:center;display:none;width:100%;max-width:420px;}
  #form-submit{width:100%;max-width:420px;padding:15px;border-radius:100px;border:none;background:var(--gold);color:var(--navy2);font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;}
  #form-submit:disabled{opacity:0.5;}
  #privacy-wrap{display:flex;align-items:center;gap:10px;width:100%;max-width:420px;}
  #privacy-wrap input[type=checkbox]{width:18px;height:18px;flex-shrink:0;accent-color:var(--teal);cursor:pointer;}
  #privacy-wrap label{font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;line-height:1.4;}
  #privacy-wrap a{color:var(--teal);}
  #countdown-screen{justify-content:center;text-align:center;gap:20px;}
  #countdown-screen h2{font-size:clamp(20px,3vw,34px);font-weight:700;color:var(--white);line-height:1.2;}
  .name-highlight{color:var(--gold);font-weight:800;}
  #countdown-screen p.sub{font-size:16px;color:var(--gray);}
  #cd-ring-wrap{position:relative;width:116px;height:116px;}
  #cd-ring-wrap svg{transform:rotate(-90deg);}
  circle.track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:5;}
  circle.prog{fill:none;stroke:var(--teal);stroke-width:5;stroke-linecap:round;stroke-dasharray:345.4;stroke-dashoffset:0;transition:stroke-dashoffset 0.95s linear;}
  #cd-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:800;color:var(--teal);}
  #wheel-screen{justify-content:center;gap:16px;}
  #wheel-wrap{position:relative;width:min(360px,82vw);height:min(360px,82vw);}
  #pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:28px solid var(--gold);filter:drop-shadow(0 2px 10px rgba(245,184,48,0.7));}
  #wheel-canvas{width:100%;height:100%;border-radius:50%;box-shadow:0 0 0 5px rgba(61,158,158,0.2),0 0 0 10px rgba(61,158,158,0.07),0 24px 80px rgba(0,0,0,0.6);}
  #wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:var(--navy2);border:4px solid var(--teal);z-index:10;display:flex;align-items:center;justify-content:center;font-size:18px;}
  #respin-bar{display:none;background:rgba(245,184,48,0.1);border:1px solid rgba(245,184,48,0.3);border-radius:100px;padding:9px 22px;font-size:13px;font-weight:500;color:var(--gold);text-align:center;}
  #result-overlay{display:none;position:fixed;inset:0;background:rgba(14,22,32,0.93);backdrop-filter:blur(10px);align-items:center;justify-content:center;z-index:100;padding:24px;}
  #result-box{background:linear-gradient(150deg,#253448 0%,#1B2A3B 100%);border:1px solid rgba(61,158,158,0.2);border-radius:28px;padding:44px 36px 36px;text-align:center;max-width:400px;width:100%;position:relative;overflow:hidden;}
  #result-box::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#3D9E9E,#F5B830,#E8633A,#7B5EA7,#4CAF82);}
  #result-emoji{font-size:52px;display:block;margin-bottom:14px;line-height:1;}
  #result-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:14px;}
  #result-title{font-size:clamp(22px,3.5vw,30px);font-weight:800;letter-spacing:-0.04em;margin-bottom:12px;color:var(--white);line-height:1.1;}
  #result-subtitle{font-size:15px;color:var(--gray);line-height:1.65;margin-bottom:28px;}
  #result-btn{background:var(--teal);color:var(--white);border:none;padding:15px 36px;border-radius:100px;width:100%;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 5px rgba(61,158,158,0.2),0 0 0 10px rgba(61,158,158,0.07),0 24px 80px rgba(0,0,0,0.6)}50%{box-shadow:0 0 0 8px rgba(61,158,158,0.32),0 0 0 16px rgba(61,158,158,0.12),0 24px 80px rgba(0,0,0,0.6)}}
  .spinning #wheel-canvas{animation:pulse 1.1s ease-in-out infinite;}
</style>
</head>

    <p>La ruota della fortuna di Metadonors</p>
  </div>
  <div class="form-intro">
    <h2>Inserisci il tuo nome<br>e gira la ruota!</h2>
    <p>Potresti vincere dei gadget speciali!</p>
  </div>
  <div class="field-group">
    <div class="field-row">
      <div class="field-wrap">
        <label>Nome <span class="req">*</span></label>
        <input type="text" id="f-nome" placeholder="Mario" autocomplete="given-name">
      </div>
      <div class="field-wrap">
        <label>Cognome <span class="req">*</span></label>
        <input type="text" id="f-cognome" placeholder="Rossi" autocomplete="family-name">
      </div>
    </div>
    <div class="field-wrap">
      <label>Email <span class="req">*</span></label>
      <input type="email" id="f-email" placeholder="mario.rossi@email.it" autocomplete="email">
    </div>
    <div class="field-wrap">
      <label>Ente / Organizzazione <span class="req">*</span></label>
      <input type="text" id="f-ente" placeholder="Nome ente">
    </div>
  </div>
  <div id="form-error"></div>
  <button id="form-submit" onclick="submitForm()">Gira la ruota!</button>
  <div id="privacy-wrap">
    <input type="checkbox" id="privacy-check">
    <label for="privacy-check">Ho letto e accetto la <a href="https://metadonors.it/privacy-policy/" target="_blank">Privacy Policy</a> <span class="req">*</span></label>
  </div>
</div>

<div id="countdown-screen" class="screen">
  <h2 id="cd-headline">Preparati!</h2>
  <p class="sub">La ruota parte tra...</p>
  <div id="cd-ring-wrap">
    <svg width="116" height="116" viewBox="0 0 116 116">
      <circle class="track" cx="58" cy="58" r="55"/>
      <circle class="prog" cx="58" cy="58" r="55" id="cd-circle"/>
    </svg>
    <div id="cd-num">5</div>
  </div>
</div>

<div id="wheel-screen" class="screen">
  <div id="wheel-wrap">
    <div id="pointer"></div>
    <canvas id="wheel-canvas" width="400" height="400"></canvas>
    <div id="wheel-center">🎯</div>
  </div>
  <div id="respin-bar"></div>
</div>

<div id="result-overlay">
  <div id="result-box">
    <span id="result-emoji"></span>
    <div id="result-label"></div>
    <div id="result-title"></div>
    <div id="result-subtitle"></div>
    <button id="result-btn" onclick="closeResult()">Ritira il tuo premio allo stand 🎁</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwiEcZYBVaHQD4W8ymI8cDnaDd4tOHaosh5p67coTQAw8jPO_mRCCWx2S7H_ouSFeR0jg/exec";
const SEG=[
  {l:"🕶",c:"#F5B830",t:"#1E2E40",type:"spark"},
  {l:"😞",c:"#2D4057",t:"#8BAABF",type:"miss"},
  {l:"🕶",c:"#F0A820",t:"#1E2E40",type:"spark"},
  {l:"🔄",c:"#E8633A",t:"#fff",type:"respin"},
  {l:"😞",c:"#263A50",t:"#7A9AB5",type:"miss"},
  {l:"🧠",c:"#3D9E9E",t:"#fff",type:"impact"},
  {l:"🕶",c:"#F5B830",t:"#1E2E40",type:"spark"},
  {l:"😞",c:"#2D4057",t:"#8BAABF",type:"miss"},
  {l:"🧠",c:"#2E8080",t:"#fff",type:"impact"},
  {l:"🔄",c:"#D45530",t:"#fff",type:"respin"},
  {l:"🕶",c:"#EDA010",t:"#1E2E40",type:"spark"},
  {l:"😞",c:"#223347",t:"#7A9AB5",type:"miss"},
];
const N=SEG.length, ARC=(2*Math.PI)/N;
let ang=0, user={};

function screen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

function submitForm(){
  const nome=document.getElementById("f-nome").value.trim();
  const cognome=document.getElementById("f-cognome").value.trim();
  const email=document.getElementById("f-email").value.trim();
  const ente=document.getElementById("f-ente").value.trim();
  const prv=document.getElementById("privacy-check").checked;
  const err=document.getElementById("form-error");
  ["f-nome","f-cognome","f-email","f-ente"].forEach(id=>document.getElementById(id).classList.remove("error"));
  err.style.display="none";
  let bad=false;
  if(!nome){document.getElementById("f-nome").classList.add("error");bad=true;}
  if(!cognome){document.getElementById("f-cognome").classList.add("error");bad=true;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){document.getElementById("f-email").classList.add("error");bad=true;}
  if(!ente){document.getElementById("f-ente").classList.add("error");bad=true;}
  if(!prv)bad=true;
  if(bad){err.textContent=!prv?"Accetta la Privacy Policy per continuare":"Compila i campi obbligatori (*)";err.style.display="block";return;}
  user={nome,cognome,email,ente};
  document.getElementById("form-submit").disabled=true;
  document.getElementById("form-submit").textContent="Un attimo...";
  startCountdown(nome);
}

function send(res){
  if(!APPS_SCRIPT_URL)return;
  fetch(APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({timestamp:new Date().toISOString(),nome:user.nome,cognome:user.cognome,email:user.email,ente:user.ente,risultato:res})}).catch(()=>{});
}

function draw(angle){
  const cv=document.getElementById("wheel-canvas"),ctx=cv.getContext("2d"),sz=cv.width,cx=sz/2,cy=sz/2,r=sz/2-4;
  ctx.clearRect(0,0,sz,sz);
  for(let i=0;i<N;i++){
    const s=angle+i*ARC,e=s+ARC,sg=SEG[i];
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=sg.c;ctx.fill();
    ctx.strokeStyle="rgba(14,22,32,0.5)";ctx.lineWidth=1.5;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+ARC/2);
    ctx.textAlign="right";ctx.font="28px serif";
    ctx.fillText(sg.l,r-20,10);
    ctx.restore();
  }
}

function easeOut(t){return 1-Math.pow(1-t,4);}

function spinTo(idx,cb){
  document.getElementById("wheel-wrap").classList.add("spinning");
  const mid=idx*ARC+ARC/2;
  const tgt=((-Math.PI/2-mid)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const base=(ang%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const diff=(tgt-base+2*Math.PI)%(2*Math.PI);
  const tot=diff+Math.PI*2*(6+Math.floor(Math.random()*4));
  const sa=ang,t0=performance.now();
  (function frame(now){
    const t=Math.min((now-t0)/4400,1);
    ang=sa+tot*easeOut(t);draw(ang);
    if(t<1){requestAnimationFrame(frame);}
    else{ang=sa+tot;draw(ang);document.getElementById("wheel-wrap").classList.remove("spinning");setTimeout(()=>cb(SEG[idx]),500);}
  })(t0);
}

function doSpin(){spinTo(Math.floor(Math.random()*N),showResult);}

function showResult(sg){
  if(sg.type==="respin"){doRespin();return;}
  const nome=esc(user.nome||"");
  const E=id=>document.getElementById(id);
  const btn=E("result-btn");btn.style.display="block";btn.textContent="Ritira il tuo premio allo stand 🎁";
  if(sg.type==="spark"){
    E("result-emoji").textContent="🕶";
    E("result-label").textContent="Primo Premio";
    E("result-label").style.cssText="display:inline-block;background:rgba(245,184,48,0.15);border:1px solid rgba(245,184,48,0.35);color:#F5B830;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:14px";
    E("result-title").textContent="Hai vinto!";E("result-title").style.color="#F5B830";
    E("result-subtitle").innerHTML="Complimenti, <strong>"+nome+"</strong>! 🎉<br>Fai uno screenshot e mostralo allo stand per ritirare il tuo premio.";
  } else if(sg.type==="impact"){
    E("result-emoji").textContent="🧠";
    E("result-label").textContent="Secondo Premio";
    E("result-label").style.cssText="display:inline-block;background:rgba(61,158,158,0.15);border:1px solid rgba(61,158,158,0.35);color:#3D9E9E;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:14px";
    E("result-title").textContent="Hai vinto!";E("result-title").style.color="#3D9E9E";
    E("result-subtitle").innerHTML="Fantastico, <strong>"+nome+"</strong>! 🎉<br>Fai uno screenshot e mostralo allo stand per ritirare il tuo premio speciale.";
  } else {
    E("result-emoji").textContent="";
    E("result-label").style.cssText="display:none";
    E("result-title").textContent="Non hai vinto.";E("result-title").style.color="rgba(255,255,255,0.8)";
    E("result-subtitle").textContent="Ci dispiace, sarà per un’altra volta!";
    btn.style.display="none";
  }
  send(sg.type==="spark"?"1° Premio":sg.type==="impact"?"2° Premio":sg.type==="miss"?"Non ha vinto":"Gira ancora");
  E("result-overlay").style.display="flex";
}

function closeResult(){document.getElementById("result-overlay").style.display="none";}

function doRespin(){
  send("Gira ancora");
  const bar=document.getElementById("respin-bar");bar.style.display="block";
  let c=3;bar.textContent="🔄 Gira ancora! Riparte tra "+c+"...";
  const iv=setInterval(()=>{c--;if(c>0){bar.textContent="🔄 Gira ancora! Riparte tra "+c+"...";}else{clearInterval(iv);bar.style.display="none";doSpin();}},1000);
}

function startCountdown(nome){
  screen("countdown-screen");
  document.getElementById("cd-headline").innerHTML="<span class='name-highlight'>"+esc(nome)+"</span>,<br>è il tuo momento!";
  const circle=document.getElementById("cd-circle"),numEl=document.getElementById("cd-num");
  let c=5;circle.style.strokeDashoffset="0";
  const iv=setInterval(()=>{
    c--;numEl.textContent=c;
    circle.style.strokeDashoffset=String(345.4*(1-c/5));
    if(c<=0){clearInterval(iv);screen("wheel-screen");draw(ang);setTimeout(doSpin,300);}
  },1000);
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
window.addEventListener("load",()=>draw(0));
</script>
</body>
</html>
